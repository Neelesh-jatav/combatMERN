services:
  - type: web
    name: combatmern-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_EXPIRE
        sync: false
      - key: COOKIE_EXPIRE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_SERVICE
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_MAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CLOUDINARY_CLIENT_NAME
        sync: false
      - key: CLOUDINARY_CLIENT_API
        sync: false
      - key: CLOUDINARY_CLIENT_SECRET
        sync: false

  - type: static
    name: combatmern-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
